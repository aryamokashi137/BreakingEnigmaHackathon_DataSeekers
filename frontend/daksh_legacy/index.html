<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered Legal Workflow Assistant — manage cases, research, draft documents, and more.">
    <title>Legal Workflow Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <div class="icon">⚖️</div>
                <span>LegalAI</span>
            </div>
            <nav>
                <a href="index.html">Dashboard</a>
            </nav>
        </div>
    </header>

    <!-- PAGE TITLE -->
    <div class="container">
        <div class="page-title">
            <h1>Case Dashboard</h1>
            <p>Manage your legal cases and leverage AI-powered tools</p>
        </div>

        <!-- ACTIONS -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
            <div>
                <span id="case-count" style="color:var(--text-secondary); font-size:0.9rem;"></span>
            </div>
            <button class="btn btn-primary" id="btn-new-case" onclick="openModal()">
                ➕ New Case
            </button>
        </div>

        <!-- CASE LIST -->
        <div class="card-grid" id="cases-list">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">📂</div>
                <p>No cases yet. Create your first case to get started.</p>
            </div>
        </div>
    </div>

    <!-- CREATE CASE MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2>Create New Case</h2>
            <form id="create-case-form" onsubmit="createCase(event)">
                <div class="form-group">
                    <label for="case-title">Case Title</label>
                    <input type="text" id="case-title" class="form-control" placeholder="e.g. Smith vs Johnson" required>
                </div>
                <div class="form-group">
                    <label for="client-name">Client Name</label>
                    <input type="text" id="client-name" class="form-control" placeholder="e.g. John Smith" required>
                </div>
                <div class="form-group">
                    <label for="case-type">Case Type</label>
                    <select id="case-type" class="form-control">
                        <option value="Criminal">Criminal</option>
                        <option value="Civil">Civil</option>
                        <option value="Corporate">Corporate</option>
                        <option value="Family">Family</option>
                        <option value="Property">Property</option>
                        <option value="Constitutional">Constitutional</option>
                        <option value="Tax">Tax</option>
                        <option value="Labor">Labor</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="case-desc">Description</label>
                    <textarea id="case-desc" class="form-control" rows="3" placeholder="Brief description of the case..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-submit-case">Create Case</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
